<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>ブロック崩しオンライン（安定Firebase）</title>
<style>
  body{margin:0;background:#020617;color:#fff;font-family:system-ui, sans-serif;text-align:center}
  #menu{padding:18px}
  canvas{background:#000;max-width:100%;border-radius:12px}
  button{
    font-size:18px;padding:10px 18px;margin:6px;border-radius:10px;border:none;
    background:#2563eb;color:#fff;cursor:pointer
  }
  button:disabled{opacity:.5;cursor:not-allowed}
  input{font-size:18px;padding:10px 12px;border-radius:10px;border:1px solid #334155;background:#0b1224;color:#fff;outline:none}
  .row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;align-items:center}
  .status{margin-top:10px;opacity:.9}
  #game{display:none;width:min(520px,92vw);height:auto}
</style>
</head>
<body>

<h1>ブロック崩し</h1>

<div id="menu">
  <div class="row">
    <button id="btnSolo">1人プレイ</button>
  </div>

  <h2>オンライン</h2>
  <div class="row">
    <input id="room" placeholder="合言葉（例: あいう）" maxlength="20" />
  </div>

  <div class="row">
    <button id="btnHost">Host（親）</button>
    <button id="btnJoin">Join（子）</button>
  </div>

  <div class="status" id="status">待機中</div>
</div>

<canvas id="game" width="400" height="600"></canvas>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDveiQpRF1O-j3b5YQ5AU1XXh0WxbnIvfE",
  authDomain: "blockgame-25fcf.firebaseapp.com",
  projectId: "blockgame-25fcf",
  storageBucket: "blockgame-25fcf.firebasestorage.app",
  messagingSenderId: "687633508213",
  appId: "1:687633508213:web:ee32069ed5d91a2a00553c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ---- UI ----
const statusEl = document.getElementById("status");
const roomEl = document.getElementById("room");
const menuEl = document.getElementById("menu");
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const btnSolo = document.getElementById("btnSolo");
const btnHost = document.getElementById("btnHost");
const btnJoin = document.getElementById("btnJoin");

function setStatus(s){ statusEl.textContent = s; }
function lockButtons(lock){
  btnSolo.disabled = lock;
  btnHost.disabled = lock;
  btnJoin.disabled = lock;
  roomEl.disabled = lock;
}

// ---- Game state ----
let paddleX = 160;
let ballX = 200;
let ballY = 320;
let vx = 3;
let vy = -3;

let roomId = "";
let role = ""; // "host" | "join"
let started = false;
let unsub = null;

// ---- Start game loop ----
function startGame(){
  if(started) return;
  started = true;
  menuEl.style.display = "none";
  canvas.style.display = "block";

  // PC: mouse
  document.addEventListener("mousemove", (e)=>{
    const r = canvas.getBoundingClientRect();
    const x = (e.clientX - r.left) * (canvas.width / r.width);
    paddleX = x - 40;
  });

  // Mobile: drag on canvas
  canvas.addEventListener("pointermove", (e)=>{
    if(e.buttons === 0) return;
    const r = canvas.getBoundingClientRect();
    const x = (e.clientX - r.left) * (canvas.width / r.width);
    paddleX = x - 40;
  });

  setInterval(update, 16);
}

async function update(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // move
  ballX += vx;
  ballY += vy;

  // walls
  if(ballX < 8){ ballX = 8; vx *= -1; }
  if(ballX > canvas.width-8){ ballX = canvas.width-8; vx *= -1; }
  if(ballY < 8){ ballY = 8; vy *= -1; }

  // paddle
  paddleX = Math.max(0, Math.min(canvas.width-80, paddleX));
  if(ballY > canvas.height-40){
    if(ballX > paddleX && ballX < paddleX+80){
      vy = -Math.abs(vy);
    }
  }

  // fail reset
  if(ballY > canvas.height + 30){
    ballX = canvas.width/2;
    ballY = canvas.height*0.55;
    vx = (Math.random()<0.5?-1:1) * 3;
    vy = -3;
  }

  // draw
  ctx.fillStyle = "white";
  ctx.fillRect(paddleX, canvas.height-20, 80, 10);

  ctx.beginPath();
  ctx.arc(ballX, ballY, 8, 0, Math.PI*2);
  ctx.fill();

  // sync (host -> firestore)
  if(role === "host" && roomId){
    try{
      await setDoc(doc(db,"rooms",roomId), { ballX, ballY }, { merge:true });
    }catch(e){
      // ここで止まらないように握りつぶし（必要なら表示）
    }
  }
}

// ---- Online ----
function normRoom(){
  return String(roomEl.value||"").trim().replace(/\s+/g,"").slice(0,20);
}

function listenRoom(){
  if(unsub) { try{unsub();}catch{} }
  unsub = onSnapshot(doc(db,"rooms",roomId), (snap)=>{
    const d = snap.data();
    if(!d) return;
    if(role === "join"){
      // joinはhostのボールを受け取る（超安定）
      if(typeof d.ballX==="number") ballX = d.ballX;
      if(typeof d.ballY==="number") ballY = d.ballY;
    }
  });
}

btnSolo.addEventListener("click", ()=>{
  role = "";
  roomId = "";
  setStatus("1人プレイ開始");
  startGame();
});

btnHost.addEventListener("click", async ()=>{
  roomId = normRoom();
  if(!roomId){ setStatus("合言葉を入れて"); return; }
  lockButtons(true);
  setStatus(`Hostで入室中…「${roomId}」`);
  role = "host";

  try{
    await setDoc(doc(db,"rooms",roomId), { ballX:200, ballY:320 }, { merge:true });
    listenRoom();
    setStatus("Host入室OK。相手はJoinで同じ合言葉。");
    startGame();
  }catch(e){
    console.error(e);
    setStatus("Host入室失敗: " + (e?.message || e));
    lockButtons(false);
  }
});

btnJoin.addEventListener("click", async ()=>{
  roomId = normRoom();
  if(!roomId){ setStatus("合言葉を入れて"); return; }
  lockButtons(true);
  setStatus(`Joinで入室中…「${roomId}」`);
  role = "join";

  try{
    const snap = await getDoc(doc(db,"rooms",roomId));
    if(!snap.exists()){
      setStatus("部屋がない。Hostが先に入室して。");
      lockButtons(false);
      return;
    }
    listenRoom();
    setStatus("Join入室OK。Hostの状態を同期中…");
    startGame();
  }catch(e){
    console.error(e);
    setStatus("Join入室失敗: " + (e?.message || e));
    lockButtons(false);
  }
});
</script>
</body>
</html>
