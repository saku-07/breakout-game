<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ブロック崩しオンライン</title>

<style>

body{
margin:0;
background:#020617;
color:white;
font-family:sans-serif;
text-align:center;
}

canvas{
background:black;
max-width:100%;
}

button{
font-size:18px;
padding:10px 20px;
margin:6px;
border-radius:8px;
border:none;
background:#2563eb;
color:white;
}

input{
font-size:18px;
padding:8px;
}

#game{
display:none;
}

</style>

</head>

<body>

<h1>ブロック崩し</h1>

<div id="menu">

<button onclick="solo()">1人プレイ</button>

<h2>オンライン</h2>

<input id="room" placeholder="合言葉">

<br><br>

<button onclick="host()">Host</button>
<button onclick="join()">Join</button>

</div>

<canvas id="game" width="400" height="600"></canvas>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore,
doc,
setDoc,
getDoc,
onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyDveiQpRF1O-j3b5YQ5AU1XXh0WxbnIvfE",
authDomain: "blockgame-25fcf.firebaseapp.com",
projectId: "blockgame-25fcf",
storageBucket: "blockgame-25fcf.firebasestorage.app",
messagingSenderId: "687633508213",
appId: "1:687633508213:web:ee32069ed5d91a2a00553c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let canvas=document.getElementById("game");
let ctx=canvas.getContext("2d");

let paddleX=160;
let ballX=200;
let ballY=300;

let vx=3;
let vy=-3;

let roomId="";
let role="";

function solo(){
startGame();
}

async function host(){

roomId=document.getElementById("room").value;

role="host";

await setDoc(doc(db,"rooms",roomId),{
ballX:200,
ballY:300
});

listen();

startGame();

}

async function join(){

roomId=document.getElementById("room").value;

role="join";

let room=await getDoc(doc(db,"rooms",roomId));

if(!room.exists()){
alert("部屋がありません");
return;
}

listen();

startGame();

}

function listen(){

onSnapshot(doc(db,"rooms",roomId),(snap)=>{

let d=snap.data();

if(role==="join"){

ballX=d.ballX;
ballY=d.ballY;

}

});

}

function startGame(){

document.getElementById("menu").style.display="none";
canvas.style.display="block";

setInterval(update,16);

}

async function update(){

ctx.clearRect(0,0,400,600);

ballX+=vx;
ballY+=vy;

if(ballX<0||ballX>400)vx*=-1;
if(ballY<0)vy*=-1;

if(ballY>560){

if(ballX>paddleX && ballX<paddleX+80){

vy=-vy;

}

}

ctx.fillStyle="white";

ctx.fillRect(paddleX,580,80,10);

ctx.beginPath();
ctx.arc(ballX,ballY,8,0,Math.PI*2);
ctx.fill();

if(role==="host"){

await setDoc(doc(db,"rooms",roomId),{
ballX,
ballY
},{merge:true});

}

}

document.addEventListener("mousemove",(e)=>{

paddleX=e.clientX-40;

});

</script>

</body>
</html>
